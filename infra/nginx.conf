server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Strict CSP for the SPA shell (LLM/SVG output is also sanitized server- + client-side).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://replicate.delivery https://*.replicate.com; media-src 'self' https://replicate.delivery; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets are immutable.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE generation stream needs buffering OFF and long read timeouts.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
