# SchoolAutomaton — full stack. `docker compose up --build` brings up backend + frontend(nginx).
# SQLite DB and the content-hashed visual cache live on the named volume `sa-data` (survives redeploys).

services:
  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    image: schoolautomaton-backend:latest
    env_file: .env
    environment:
      SA_ENV: production
      SA_DATABASE_URL: sqlite+aiosqlite:////app/data/schoolautomaton.db
      SA_DATA_DIR: /app/data
      # Public origin(s) the browser uses (your Cloudflare hostname). Same-origin via nginx means
      # CORS is mostly moot, but keep it correct. Override in .env.
      SA_CORS_ORIGINS: ${SA_CORS_ORIGINS:-http://localhost:8080}
    volumes:
      - sa-data:/app/data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/healthz'); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    image: schoolautomaton-frontend:latest
    depends_on:
      backend:
        condition: service_started
    # Published host port is configurable via .env. Bound to 127.0.0.1 by default so only the
    # local host (or a Cloudflare tunnel running on this machine) can reach it — set
    # SA_HTTP_BIND=0.0.0.0 for direct LAN/public access. With the bundled cloudflared service
    # (docker-compose.cloudflared.yml) you don't need this published port at all.
    ports:
      - "${SA_HTTP_BIND:-127.0.0.1}:${SA_HTTP_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  sa-data:
